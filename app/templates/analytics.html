{% extends "base.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <h1 class="m-0 text-dark font-weight-bold"><i class="fas fa-chart-line mr-2"></i> Sales Intelligence</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card shadow card-outline card-primary">
            <div class="card-header border-0 bg-white pt-3">
                <h3 class="card-title text-bold">Revenue by Fabric Type</h3>
                <div class="card-tools">
                    <button type="button" class="btn btn-tool" data-card-widget="collapse">
                        <i class="fas fa-minus"></i>
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="chart">
                    <canvas id="salesChart" style="min-height: 400px; height: 400px; max-height: 400px; max-width: 100%;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-info">
                <h3 class="card-title"><i class="fas fa-lightbulb mr-2"></i> Analysis Insights</h3>
            </div>
            <div class="card-body">
                <p class="text-muted">
                    هذا الرسم يوضح الأقمشة الأكثر مبيعاً. بناءً على هذه البيانات، يمكنك اتخاذ قرار بزيادة الطلب على الأصناف الأكثر ربحية.
                </p>
                <ul class="list-group list-group-unbordered mb-3">
                    <li class="list-group-item">
                        <b>Most Profitable</b> <a class="float-right text-success font-weight-bold" id="topFabric">Loading...</a>
                    </li>
                </ul>
                <hr>
                <button class="btn btn-block btn-primary shadow-sm" onclick="window.print()">
                    <i class="fas fa-file-pdf mr-2"></i> Export Report
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // وضع البيانات داخل "كتلة" لمنع تنبيهات VS Code
    document.addEventListener('DOMContentLoaded', function() {
        const labels = {{ labels|tojson | safe }};
        const values = {{ values|tojson | safe }};

        // تحديث اسم القماش الأكثر ربحاً في اللوحة الجانبية
        if (values.length > 0) {
            const maxVal = Math.max(...values);
            const index = values.indexOf(maxVal);
            document.getElementById('topFabric').innerText = labels[index];
        }

        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar', // يمكنك تغييرها لـ 'pie' أو 'doughnut'
            data: {
                labels: labels,
                datasets: [{
                    label: 'Revenue ($)',
                    data: values,
                    backgroundColor: [
                        'rgba(16, 185, 129, 0.7)',
                        'rgba(59, 130, 246, 0.7)',
                        'rgba(245, 158, 11, 0.7)',
                        'rgba(239, 68, 68, 0.7)'
                    ],
                    borderColor: 'rgba(255, 255, 255, 1)',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'top' }
                },
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: { color: '#666' }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
