{% extends "base.html" %}
{% block content %}

<div class="container-fluid mt-4">
    <div class="card card-success shadow">
        <div class="card-header">
            <h3 class="card-title"><i class="fas fa-plus-circle"></i> Add Fabric Batch</h3>
        </div>

        <form method="POST" action="{{ url_for('inventory.add_product') }}" enctype="multipart/form-data">
            <div class="card-body">
                
                <h4 class="text-success mb-3">Fabric Information</h4>
                <div class="row">
                    <!-- Fabric Name -->
                    <div class="col-md-5">
                        <label>Fabric Name</label>
                        <input type="text" id="fabric-name" name="name" class="form-control" list="fabric-list" autocomplete="off" required>
                        <datalist id="fabric-list"></datalist>
                    </div>

                    <!-- 🌟 New Category Dropdown 🌟 -->
                    <div class="col-md-4">
                        <label>Fabric Category</label>
                        <select class="form-control" id="category_id" name="category_id" required>
                            <option value="">-- Select Category --</option>
                            {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Main Image -->
                    <div class="col-md-3">
                        <label>Main Image</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                </div>

                <div class="mt-3">
                    <label>Description</label>
                    <textarea name="description" id="description" rows="2" class="form-control"></textarea>
                </div>

                <hr>

                <h4 class="text-success mb-3">Pricing</h4>
                <div class="row">
                    <div class="col-md-4">
                        <label>Cost Price / Meter</label>
                        <input type="number" step="0.01" id="cost_price_per_meter" name="cost_price_per_meter" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Selling Price / Meter</label>
                        <input type="number" step="0.01" id="selling_price" name="selling_price" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Purchase Cost (Batch)</label>
                        <input type="number" step="0.01" name="source_cost_price" class="form-control" required>
                    </div>
                </div>

                <hr>

                <h4 class="text-success mb-3">Supplier Information</h4>
                <div class="row">
                    <div class="col-md-6">
                        <label>Supplier Name</label>
                        <input type="text" name="partner_name" class="form-control" required>
                    </div>
                </div>

                <hr>

                <h4 class="text-success mb-3">Patterns & Colors</h4>
                <div id="color-entries-container">
                    <div class="row color-row border rounded p-2 mb-3">
                        <div class="col-md-5">
                            <label>Pattern Name</label>
                            <input type="text" name="color_names[]" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>Pattern Image</label>
                            <input type="file" name="variant_images[]" class="form-control" accept="image/*" onchange="previewImage(this)">
                            <img class="img-preview mt-2" style="width:50px; height:50px; object-fit:cover; display:none; border-radius:50%; border:1px solid #ccc;">
                        </div>
                        <div class="col-md-3">
                            <label>Quantity (Meters)</label>
                            <input type="number" step="0.1" name="color_quantities[]" class="form-control" required>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="button" class="btn btn-danger" onclick="removeColorRow(this)">-</button>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-primary" onclick="addColorRow()">+ Add Pattern</button>
            </div>

            <div class="card-footer">
                <button type="submit" class="btn btn-success btn-lg">Save Fabric Batch</button>
            </div>
        </form>
    </div>
</div>

<script>
function addColorRow() {
    const container = document.getElementById('color-entries-container');
    const row = document.createElement('div');
    row.className = 'row color-row border rounded p-2 mb-3';
    row.innerHTML = `
        <div class="col-md-5"><label>Pattern Name</label><input type="text" name="color_names[]" class="form-control" required></div>
        <div class="col-md-3"><label>Pattern Image</label><input type="file" name="variant_images[]" class="form-control" accept="image/*" onchange="previewImage(this)"><img class="img-preview mt-2" style="width:50px; height:50px; object-fit:cover; display:none; border-radius:50%; border:1px solid #ccc;"></div>
        <div class="col-md-3"><label>Quantity (Meters)</label><input type="number" step="0.1" name="color_quantities[]" class="form-control" required></div>
        <div class="col-md-1 d-flex align-items-end"><button type="button" class="btn btn-danger" onclick="removeColorRow(this)">-</button></div>
    `;
    container.appendChild(row);
}

function removeColorRow(btn) { btn.closest('.color-row').remove(); }

function previewImage(input) {
    if(input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = input.parentElement.querySelector('.img-preview');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// Fixed fetch template string URLs
const fabricInput = document.getElementById("fabric-name");
fabricInput.addEventListener("input", async function() {
    const value = this.value.trim();
    if(value.length < 1) return;
    const response = await fetch(`/product/search?q=${encodeURIComponent(value)}`);
    const data = await response.json();
    const fabricList = document.getElementById("fabric-list");
    fabricList.innerHTML = "";
    data.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        fabricList.appendChild(option);
    });
});

fabricInput.addEventListener("change", async function() {
    const fabricName = this.value.trim();
    if(!fabricName) return;
    const response = await fetch(`/product/details/${encodeURIComponent(fabricName)}`);
    const data = await response.json();
    if(!data.name) return;
    document.getElementById("description").value = data.description || "";
    document.getElementById("cost_price_per_meter").value = data.cost_price_per_meter || 0;
    document.getElementById("selling_price").value = data.selling_price || 0;
});
</script>
{% endblock %}
