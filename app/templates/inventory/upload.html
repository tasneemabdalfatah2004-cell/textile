{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-8">
        <div class="card card-outline card-info shadow-lg animate__animated animate__fadeInUp">
            <div class="card-header bg-white border-bottom-0 text-center pt-4">
                <h3 class="card-title float-none text-bold text-secondary" style="font-size: 1.5rem;">
                    <i class="fas fa-qrcode text-info mr-2"></i> مسح وتحليل أنسجة القماش
                </h3>
                <p class="text-muted mt-2">قم برفع صورة واضحة لنقشة أو خامة القماش ليقوم الذكاء الاصطناعي بتحليلها فوراً</p>
            </div>
            
            <form action="{{ url_for('inventory.analyze') }}" method="POST" enctype="multipart/form-data">
                <div class="card-body px-5 pb-4">
                    <div class="form-group">
                        <div class="custom-file-upload border- dashed rounded p-5 text-center bg-light" 
                             style="border: 2px dashed #3498db; cursor: pointer; transition: all 0.3s ease;">
                            <i class="fas fa-cloud-upload-alt text-primary mb-3" style="font-size: 3.5rem;"></i>
                            <h5 class="text-bold text-dark">اسحب الصورة إلى هنا أو اضغط للتصفح</h5>
                            <p class="text-sm text-muted mb-0">يدعم صيغ JPG, PNG (الحد الأقصى 5 ميجابايت)</p>
                            <input type="file" name="file" class="form-control-file d-none" id="fabricFile" accept="image/*" required>
                        </div>
                        <div id="file-name-preview" class="text-center mt-3 text-success text-bold d-none">
                            <i class="fas fa-check-circle mr-1"></i> <span id="file-name-text"></span>
                        </div>
                    </div>
                </div>
                
                <div class="card-footer bg-white border-top-0 text-center pb-4">
                    <button type="submit" class="btn btn-info btn-lg px-5 shadow-sm text-bold" style="border-radius: 30px;">
                        <i class="fas fa-brain mr-2"></i> بدء التحليل الذكي
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const uploadZone = document.querySelector('.custom-file-upload');
    const fileInput = document.getElementById('fabricFile');
    const namePreview = document.getElementById('file-name-preview');
    const nameText = document.getElementById('file-name-text');

    uploadZone.addEventListener('click', () => fileInput.click());
    
    uploadZone.addEventListener('mouseover', () => {
        uploadZone.style.backgroundColor = '#e8f4fd';
        uploadZone.style.borderColor = '#2980b9';
    });
    
    uploadZone.addEventListener('mouseout', () => {
        uploadZone.style.backgroundColor = '#f8f9fa';
        uploadZone.style.borderColor = '#3498db';
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            nameText.textContent = e.target.files[0].name;
            namePreview.classList.remove('d-none');
        }
    });
</script>
{% endblock %}
