{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-0">{{ product.name }}</h2>
            <p class="text-muted">Manage stock, prices, category, and fabric designs</p>
        </div>
        <div class="text-end">
            <span class="badge bg-success fs-6 p-2 shadow-sm rounded-pill px-3">
                <i class="fas fa-tag me-1"></i> Selling: ${{ "%.2f"|format(product.selling_price) }}
            </span>
        </div>
    </div>

    <form action="{{ url_for('inventory.edit_product', id=product.id) }}" method="POST" enctype="multipart/form-data">
        
        <!-- 🌟 New Category Selection Card 🌟 -->
        <div class="card mb-4 border-0 shadow-sm rounded-4 p-4">
            <div class="row align-items-center">
                <div class="col-md-12">
                    <label class="text-muted small fw-bold mb-2"><i class="fas fa-folder text-success me-1"></i> FABRIC CATEGORY</label>
                    <select class="form-select form-select-lg border-0 bg-light" id="category_id" name="category_id" required style="border-radius: 0.8rem;">
                        <option value="">-- Select Category --</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}" {% if category.id == product.category_id %}selected{% endif %}>
                                {{ category.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- Prices Card -->
        <div class="card mb-4 border-0 shadow-sm rounded-4 p-3">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <label class="text-muted small fw-bold mb-1">SELLING PRICE ($)</label>
                    <input type="number" step="0.01" name="selling_price" value="{{ product.selling_price }}" class="form-control form-control-lg border-0 bg-light">
                </div>
                <div class="col-md-6">
                    <label class="text-muted small fw-bold mb-1">COST PRICE ($)</label>
                    <input type="number" step="0.01" name="cost_price_per_meter" value="{{ product.cost_price_per_meter }}" class="form-control form-control-lg border-0 bg-light">
                </div>
            </div>
        </div>

        <h5 class="mb-3"><i class="fas fa-layer-group text-primary me-2"></i> Current Designs Inventory</h5>
        <div class="row row-cols-1 row-cols-md-4 g-4 mb-5">
            {% for variant in product.variants %}
            <div class="col">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                    <img src="{{ url_for('static', filename='uploads/' + (variant.image_filename or 'default.jpg')) }}" class="card-img-top" style="height: 180px; object-fit: cover;">
                    <div class="card-body bg-light">
                        <label class="small text-muted mb-1">Meters in stock</label>
                        <input type="number" name="qty_variant_{{ variant.id }}" value="{{ variant.quantity }}" class="form-control shadow-none">
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4 mb-5" style="background-color: #212529; color: white;">
            <h5 class="mb-3"><i class="fas fa-plus-circle text-warning me-2"></i> Add New Design to Fabric</h5>
            <div class="row align-items-end">
                <div class="col-md-3">
                   <label class="small text-light mb-1">Design Name</label>
                   <input type="text" name="new_variant_name" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Flower Silk">
                </div>
                <div class="col-md-6">
                    <label class="small text-light mb-1">Upload Design Image</label>
                    <input type="file" name="new_variant_image" class="form-control bg-dark text-white border-secondary">
                </div>

                <div class="col-md-3">
                    <label class="small text-light mb-1">Initial Quantity</label>
                    <input type="number" name="new_variant_qty" class="form-control bg-dark text-white border-secondary" placeholder="0.0">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill shadow">
                        <i class="fas fa-save me-1"></i> Commit Changes
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<style>
    .rounded-4 { border-radius: 1.5rem !important; }
    .form-control:focus, .form-select:focus { box-shadow: none; border: 2px solid #0d6efd !important; }
</style>
{% endblock %}
