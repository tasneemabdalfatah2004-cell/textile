{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-4">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-header bg-dark text-white text-center py-4" style="border-radius: 15px 15px 0 0;">
                <h3 class="font-weight-bold mb-0"><i class="fas fa-lock mr-2"></i> System Login</h3>
            </div>
            <div class="card-body p-4">
            
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show text-center mb-3" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="form-group mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text h-100"><i class="fas fa-user"></i></span>
                            </div>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text h-100"><i class="fas fa-key"></i></span>
                            </div>
                            <input type="password" name="password" class="form-control" placeholder="******" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg mt-4 shadow-sm w-100">
                        Login
                    </button>
                </form>
            </div>
            <div class="card-footer text-center bg-light" style="border-radius: 0 0 15px 15px;">
                <small class="text-muted">Admin Access Only</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
